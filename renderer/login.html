<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta http-equiv="Content-Security-Policy" content="default-src 'self'; script-src 'self' 'unsafe-inline' 'unsafe-eval' https://cdn.jsdelivr.net; style-src 'self' 'unsafe-inline' https://cdnjs.cloudflare.com https://fonts.googleapis.com; font-src 'self' https://fonts.gstatic.com https://cdnjs.cloudflare.com; img-src 'self' data: file:; connect-src 'self' https:">
    <title>Acesso - Controle Financeiro</title>
    <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 24 24' fill='none' stroke='%236366f1' stroke-width='2'><path d='M12 8c-1.657 0-3 .895-3 2s1.343 2 3 2 3 .895 3 2-1.343 2-3 2m0-8c1.11 0 2.08.402 2.599 1M12 8V7m0 1v8m0 0v1m0-1c-1.11 0-2.08-.402-2.599-1M21 12a9 9 0 11-18 0 9 9 0 0118 0z'/></svg>">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <link rel="stylesheet" href="css/style.css">
    <link rel="stylesheet" href="css/login.css">
</head>
<body>
    <div class="login-container">
        <header class="top-bar-login">
            <div class="top-bar-actions">
                <button class="btn-icon" id="closeBtn" title="Fechar"><i class="fas fa-times"></i></button>
            </div>
        </header>

        <div class="bg-blob blob-1"></div>
        <div class="bg-blob blob-2"></div>

        <div class="login-box-wrapper">
            <div class="login-box">
            <div class="login-header">
                <div class="login-logo">
                    <i class="fas fa-wallet"></i>
                </div>
                <h1 id="title">Bem-vindo</h1>
                <p id="subtitle">Faça login para gerenciar suas finanças</p>
            </div>

            <form id="loginForm" class="login-form">
                <div id="registerNameGroup" class="form-group" style="display: none;">
                    <label for="regNome">Seu Nome</label>
                    <div class="login-input-wrapper">
                        <i class="fas fa-id-card"></i>
                        <input type="text" id="regNome" class="form-control" placeholder="Seu nome completo">
                    </div>
                </div>

                <div class="form-group">
                    <label for="usuario">E-mail</label>
                    <div class="login-input-wrapper">
                        <i class="fas fa-envelope"></i>
                        <input type="email" id="usuario" class="form-control" placeholder="seu@email.com" required>
                    </div>
                </div>

                <div class="form-group">
                    <label for="senha">Senha</label>
                    <div class="login-input-wrapper">
                        <i class="fas fa-lock"></i>
                        <input type="password" id="senha" class="form-control" placeholder="Sua senha secreta" required>
                        <button type="button" class="toggle-password-btn" id="togglePassword">
                            <i class="fas fa-eye" id="eyeIcon"></i>
                        </button>
                    </div>
                </div>

                <button type="submit" id="submitBtn" class="btn btn-primary login-btn">Entrar</button>
            </form>

            <div id="errorMessage" class="alert-item danger" style="display: none; margin-top: 1.5rem; justify-content: center; padding: 0.75rem">
                <strong>Erro!</strong> Usuário ou senha incorretos.
            </div>

            <div class="login-footer">
                <p id="toggleText" class="text-muted" style="font-size: 0.85rem">Ainda não tem uma conta?</p>
                <button id="toggleAuth" class="toggle-auth">Cadastre-se agora</button>
            </div>
        </div>
    </div>
    </div>
    
    <script src="js/login.js"></script>
</body>
</html>
